<!DOCTYPE html>
<html>
<head>
  <title>LLM Chat</title>
  <link rel="stylesheet" href="llmChat.css">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Conversations</h2>
      <button id="newBtn" class="btn">+ New Chat</button>
      <div id="convList"></div>
      <input type="text" id="searchInput" placeholder="Search...">
      <button id="searchBtn" class="btn">Search</button>
    </div>

    <div class="main">
      <div id="messages"></div>
      <textarea id="input" placeholder="Type message..."></textarea>
      <button id="sendBtn" class="btn">Send</button>
    </div>
  </div>

  <script src="llmChat.js"></script>
</body>
</html>
